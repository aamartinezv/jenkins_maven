name: Docker Image Build and Deploy

on:
  push:
    branches: [ "main" ]
# Triggers the workflow when there's a push to the 'ci-cd-workflow' branch.


jobs:
  build:

    runs-on: ubuntu-latest
  # Specifies the latest Ubuntu runner for the job environment.

    steps:
    - uses: actions/checkout@v4
      with: 
        fetch-depth: 0
   # Checks out the repository code into the runner's workspace.
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
   # Sets up JDK 11, using the 'temurin' distribution, and enables Maven caching to speed up the build process.     

    - name: Build and Analyze
      run: mvn -B verify -DskipTests
      # Uses Maven to build the application and run SonarQube analysis, skipping tests for faster builds.

    - name: Login to Docker
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    # Logs into Docker Hub using credentials stored in GitHub Secrets, allowing for subsequent image push actions.
          
    - name: Build and Push Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: /Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/simple-java-maven:latest
