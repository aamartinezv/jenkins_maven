name : CI/CD Pipeline
on:
  push:
    branches: [feature/ci_setup]

jobs:
  build_and_push_jar:
    runs-on: ubuntu-latest
    permissions:
        contents: read
        packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: increment version
        run: |
          mvn build-helper:parse-version versions:set \
          -DnewVersion=\${parsedVersion.majorVersion}.\
          \${parsedVersion.minorVersion}.\${{ github.run_number }} \
          versions:commit
          
          STRING_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          
          echo "VERSION=$STRING_VERSION" >> $GITHUB_ENV
      
      - name: build image
        env:
          DOCKER_USER: benlevydockerinfinity
          DOCKER_PASSWORD: ${{ secret.DOCKERHUB_PUSH }}
        run: | 
          docker build -t ${{ DOCKER_USER }}/hello_world_java:latest \
          -t ${{ DOCKER_USER }}/hello_world_java:${{ env.VERSION }}  .
          
          docker login -u ${{ DOCKER_USER }} -p ${{ DOCKER_PASSWORD }}
          docker push hello_world_java:latest
          docker push hello_world_java:${{ env.VERSION }}


