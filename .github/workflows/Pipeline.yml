name : CI/CD Pipeline
on:
  push:
    branches: [master]

jobs:
  build_and_push_jar:
    runs-on: ubuntu-latest
    permissions:
        contents: read
        packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: increment version
        run: |
          mvn build-helper:parse-version versions:set \
          -DnewVersion=\${parsedVersion.majorVersion}.\
          \${parsedVersion.minorVersion}.\${{ github.run_number }} \
          versions:commit
          
          STRING_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          
          echo "VERSION=$STRING_VERSION" >> $GITHUB_ENV
      
      - name: build image
        run: | 
          docker build -t ${{ vars.DOCKER_USER }}/hello_world_java:latest \
          -t ${{ vars.DOCKER_USER }}/hello_world_java:${{ env.VERSION }}  .
          
          docker login -u ${{ vars.DOCKER_USER }} -p ${{ secrets.DOCKERHUB_PUSH }}
          docker push ${{ vars.DOCKER_USER }}/hello_world_java:latest
          docker push ${{ vars.DOCKER_USER }}/hello_world_java:${{ env.VERSION }}
      - name: deploy image
        run: docker run ${{ vars.DOCKER_USER }}/hello_world_java:latest

