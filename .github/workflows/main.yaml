name: pipeline
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to docker
        uses: docker/login-action@v4
        with:
          username: odedanuka
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: odedanuka/maven:${{ github.ref_name }}

  deliver:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Pull image
        run: docker pull odedanuka/maven:${{ github.ref_name }}

      - name: Run container
        run: docker run -d --rm odedanuka/maven:${{ github.ref_name }}
