name: pipeline
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - run: mvn clean package

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - run: mvn test
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: built-jar
          path: target/*.jar

  deliver:
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: built-jar
          path: target/
      - run: java -jar target/*.jar
