name: pipeline
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21' # Matches your POM's requirement
          cache: 'maven'

      - name: Build and Package
        run: mvn clean package -DskipTests

      - name: Login to docker
        uses: docker/login-action@v4
        with:
          username: odedanuka
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: odedanuka/maven:${{ github.ref }}

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - run: mvn test

  deliver:
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Pull image
        run: docker pull odedanuka/maven${{ github.ref }}

      - name: Run container
        run: docker run -d --rm odedanuka/maven${{ github.ref }}
